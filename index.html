<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>내 포트폴리오 (네이버 연동)</title>
<style>
  :root {
    --bg: #0f172a; --bg2: #1e293b; --bg3: #334155;
    --surface: #1e293b; --text: #f1f5f9; --text2: #94a3b8;
    --blue: #3b82f6; --green: #22c55e; --red: #ef4444;
    --border: rgba(148,163,184,0.12); --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 80px; }
  .header { position: sticky; top: 0; z-index: 100; background: rgba(15,23,42,0.8); backdrop-filter: blur(10px); padding: 16px; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .live-badge { font-size: 11px; color: var(--green); display: flex; align-items: center; gap: 4px; }
  .dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; }
  .summary { padding: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .s-card { background: var(--surface); padding: 16px; border-radius: var(--radius); border-top: 3px solid var(--blue); }
  .s-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .s-value { font-size: 18px; font-weight: 700; }
  .acct-card { background: var(--surface); margin: 0 16px 12px; border-radius: var(--radius); overflow: hidden; }
  .acct-header { padding: 12px 16px; background: rgba(255,255,255,0.03); font-size: 14px; font-weight: 600; display: flex; justify-content: space-between; }
  .stock-row { display: flex; justify-content: space-between; padding: 14px 16px; border-top: 0.5px solid var(--border); cursor: pointer; }
  .stock-row:active { background: var(--bg3); }
  .pos { color: var(--green); } .neg { color: var(--red); }
  .stock-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .stock-info { font-size: 11px; color: var(--text2); }
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: flex-end; }
  .modal.open { display: flex; }
  .sheet { background: var(--bg2); width: 100%; padding: 20px 20px 40px; border-radius: 20px 20px 0 0; animation: slideUp 0.3s; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  input, select { width: 100%; padding: 12px; margin: 8px 0 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg3); color: #fff; font-size: 16px; }
  .btn { width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; }
  .btn-save { background: var(--blue); color: #fff; }
  .btn-del { background: var(--red); color: #fff; margin-top: 10px; }
  .btn-close { background: transparent; color: var(--text2); margin-top: 10px; }
  .fab { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; border-radius: 28px; background: var(--blue); color: #fff; font-size: 30px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
</style>
</head>
<body>

<div class="header">
  <span style="font-weight:700">스마트 포트폴리오</span>
  <div class="live-badge"><div class="dot" id="live-dot"></div> <span id="status">연결됨</span></div>
</div>

<div class="summary">
  <div class="s-card">
    <div class="s-label">총 자산</div>
    <div class="s-value" id="total-val">₩0</div>
  </div>
  <div class="s-card" id="total-card">
    <div class="s-label">총 수익률</div>
    <div class="s-value" id="total-ret">0.00%</div>
  </div>
</div>

<div id="container"></div>

<button class="fab" onclick="toggleModal('add-modal', true)">+</button>

<div class="modal" id="add-modal">
  <div class="sheet">
    <h3>종목 추가</h3>
    <input type="text" id="f-acct" placeholder="계좌명 (예: ISA)">
    <input type="text" id="f-ticker" placeholder="종목코드 (예: 005930)">
    <select id="f-mkt">
      <option value="KRX">한국 주식</option>
      <option value="US">미국 주식</option>
    </select>
    <div style="display:flex; gap:10px">
      <input type="number" id="f-qty" placeholder="수량">
      <input type="number" id="f-avg" placeholder="평단가">
    </div>
    <button class="btn btn-save" onclick="addStock()">저장하기</button>
    <button class="btn btn-close" onclick="toggleModal('add-modal', false)">닫기</button>
  </div>
</div>

<div class="modal" id="del-modal">
  <div class="sheet">
    <h3 id="del-title">종목 삭제</h3>
    <p style="margin: 10px 0; color: var(--text2);">이 종목을 포트폴리오에서 제거하시겠습니까?</p>
    <button class="btn btn-del" onclick="confirmDelete()">삭제 확정</button>
    <button class="btn btn-close" onclick="toggleModal('del-modal', false)">취소</button>
  </div>
</div>

<script>
let portfolio = JSON.parse(localStorage.getItem('pf_smart_v1')) || { accounts: {} };
let delRef = null;

function toggleModal(id, show) {
  document.getElementById(id).classList.toggle('open', show);
}

// ── 데이터 가져오기 (종목명 포함) ──
async function fetchStockData(ticker, market) {
  try {
    if (market === 'KRX') {
      const url = `https://polling.finance.naver.com/api/realtime?query=SERVICE_ITEM:${ticker}`;
      const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
      const data = await res.json();
      const json = JSON.parse(data.contents);
      const item = json.result.areas[0].datas[0];
      return { price: item.nv, name: item.nm }; // nv: 현재가, nm: 종목명
    } else {
      const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}`;
      const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
      const data = await res.json();
      const json = JSON.parse(data.contents);
      const meta = json.chart.result[0].meta;
      return { price: meta.regularMarketPrice, name: ticker }; // 미국은 티커를 이름으로 활용
    }
  } catch (e) { return null; }
}

async function refreshAll() {
  document.getElementById('status').textContent = "조회 중...";
  document.getElementById('live-dot').style.background = "#f59e0b";

  for (const acct in portfolio.accounts) {
    for (const s of portfolio.accounts[acct].stocks) {
      const data = await fetchStockData(s.ticker, s.market);
      if (data) {
        s.curPrice = data.price;
        if (data.name) s.name = data.name; // 종목명 업데이트
      }
    }
  }
  
  document.getElementById('status').textContent = "업데이트 완료";
  document.getElementById('live-dot').style.background = "#22c55e";
  render();
}

function addStock() {
  const acct = document.getElementById('f-acct').value || '기본계좌';
  const ticker = document.getElementById('f-ticker').value.trim();
  const market = document.getElementById('f-mkt').value;
  const qty = parseFloat(document.getElementById('f-qty').value);
  const avg = parseFloat(document.getElementById('f-avg').value);

  if(!ticker || !qty || !avg) return alert("정보를 모두 입력하세요.");

  if(!portfolio.accounts[acct]) portfolio.accounts[acct] = { stocks: [] };
  portfolio.accounts[acct].stocks.push({ 
    ticker, market, qty, avg, 
    curPrice: avg, 
    name: ticker // 초기값은 티커로 설정
  });

  localStorage.setItem('pf_smart_v1', JSON.stringify(portfolio));
  toggleModal('add-modal', false);
  refreshAll();
}

function openDel(acct, idx) {
  delRef = { acct, idx };
  const stock = portfolio.accounts[acct].stocks[idx];
  document.getElementById('del-title').textContent = (stock.name || stock.ticker) + " 삭제";
  toggleModal('del-modal', true);
}

function confirmDelete() {
  const { acct, idx } = delRef;
  portfolio.accounts[acct].stocks.splice(idx, 1);
  if(portfolio.accounts[acct].stocks.length === 0) delete portfolio.accounts[acct];
  localStorage.setItem('pf_smart_v1', JSON.stringify(portfolio));
  toggleModal('del-modal', false);
  render();
}

function render() {
  const container = document.getElementById('container');
  container.innerHTML = '';
  let totalVal = 0, totalCost = 0;

  for (const acct in portfolio.accounts) {
    let acctSum = 0;
    const card = document.createElement('div');
    card.className = 'acct-card';
    
    const rows = portfolio.accounts[acct].stocks.map((s, i) => {
      const isUS = s.market === 'US';
      const rate = isUS ? 1380 : 1;
      const val = s.curPrice * s.qty * rate;
      const cost = s.avg * s.qty * rate;
      totalVal += val; totalCost += cost; acctSum += val;
      const pnl = ((s.curPrice - s.avg) / s.avg * 100).toFixed(2);

      return `
        <div class="stock-row" onclick="openDel('${acct}', ${i})">
          <div>
            <div class="stock-name">${s.name || s.ticker}</div>
            <div class="stock-info">${s.ticker} · ${s.qty}주 · ₩${s.avg.toLocaleString()}</div>
          </div>
          <div style="text-align:right">
            <div style="font-weight:600">₩${val.toLocaleString(undefined, {maximumFractionDigits:0})}</div>
            <div class="stock-info ${pnl>=0?'pos':'neg'}">${pnl>=0?'+':''}${pnl}%</div>
          </div>
        </div>
      `;
    }).join('');

    card.innerHTML = `<div class="acct-header"><span>${acct}</span><span>₩${acctSum.toLocaleString(undefined, {maximumFractionDigits:0})}</span></div>${rows}`;
    container.appendChild(card);
  }

  document.getElementById('total-val').textContent = '₩' + totalVal.toLocaleString(undefined, {maximumFractionDigits:0});
  const totalRet = totalCost > 0 ? ((totalVal - totalCost) / totalCost * 100).toFixed(2) : 0;
  const retEl = document.getElementById('total-ret');
  retEl.textContent = (totalRet >= 0 ? '+' : '') + totalRet + '%';
  retEl.className = 's-value ' + (totalRet >= 0 ? 'pos' : 'neg');
}

render();
refreshAll();
</script>
</body>
</html>
