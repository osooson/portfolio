<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="내 포트폴리오">
<meta name="theme-color" content="#0f172a">
<title>내 포트폴리오</title>

<style>
:root {
  --bg: #0f172a;
  --bg2: #1e293b;
  --bg3: #334155;
  --surface: #1e293b;
  --surface2: #273548;
  --border: rgba(148,163,184,0.12);
  --border2: rgba(148,163,184,0.22);
  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #64748b;
  --blue: #3b82f6;
  --blue-light: #60a5fa;
  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.12);
  --red: #ef4444;
  --amber: #f59e0b;
  --teal: #14b8a6;
  --radius: 14px;
  --radius-sm: 8px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, 'SF Pro Text', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* 헤더 */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(15,23,42,0.85);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 0.5px solid var(--border);
  padding: calc(var(--safe-top) + 12px) 16px 12px;
}
.header-row { display: flex; justify-content: space-between; align-items: center; }
.header-title { font-size: 20px; font-weight: 700; color: var(--text); }
.live-badge { display: flex; align-items: center; gap: 5px; font-size: 11px; padding: 4px 9px; border-radius: 20px; background: var(--green-dim); color: var(--green); }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* 요약 카드 */
.summary { padding: 14px 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.s-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; position: relative; }
.s-card.blue { border-top: 3px solid var(--blue); }
.s-card.green { border-top: 3px solid var(--green); }
.s-card.red { border-top: 3px solid var(--red); }
.s-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.s-value { font-size: 18px; font-weight: 700; }
.pos { color: var(--green); }
.neg { color: var(--red); }

/* 탭 */
.tabs-wrap { padding: 0 16px 10px; display: flex; gap: 6px; overflow-x: auto; }
.tab { padding: 7px 16px; border-radius: 20px; font-size: 13px; border: 0.5px solid var(--border2); background: var(--surface); color: var(--text2); white-space: nowrap; }
.tab.active { background: var(--blue); color: #fff; border-color: var(--blue); }

/* 계좌 및 종목 */
.section { padding: 0 16px; }
.acct-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
.acct-header { display: flex; justify-content: space-between; align-items: center; padding: 13px 14px; background: rgba(255,255,255,0.02); }
.acct-name { font-size: 14px; font-weight: 600; }
.stock-row { display: flex; justify-content: space-between; padding: 12px 14px; border-top: 0.5px solid var(--border); transition: background 0.1s; cursor: pointer; }
.stock-row:active { background: var(--bg3); }
.ticker { font-size: 13px; font-weight: 600; }
.mkt-badge { font-size: 9px; padding: 2px 5px; border-radius: 4px; margin-left: 4px; background: var(--bg3); color: var(--text2); }
.stock-info { font-size: 11px; color: var(--text3); margin-top: 2px; }
.stock-right { text-align: right; }

/* 모달 */
.sheet-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
.sheet-bg.open { display: flex; }
.sheet { background: var(--bg2); border-radius: 20px 20px 0 0; padding: 16px 16px calc(24px + var(--safe-bottom)); width: 100%; max-width: 500px; animation: slideUp 0.3s ease-out; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.sheet-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
.form-row { margin-bottom: 12px; }
.form-label { font-size: 12px; color: var(--text3); margin-bottom: 4px; }
input, select { width: 100%; padding: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--bg3); color: #fff; font-size: 15px; outline: none; }

.btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
.btn { padding: 14px; border-radius: var(--radius-sm); border: none; font-weight: 600; font-size: 15px; cursor: pointer; }
.btn-save { background: var(--blue); color: #fff; }
.btn-cancel { background: var(--bg3); color: var(--text2); }
.btn-delete { background: var(--red); color: #fff; width: 100%; margin-top: 10px; }

.fab { position: fixed; bottom: calc(30px + var(--safe-bottom)); right: 20px; width: 56px; height: 56px; border-radius: 28px; background: var(--blue); color: #fff; font-size: 28px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 90; }

.empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <span class="header-title">내 포트폴리오</span>
    <div class="live-badge">
      <span class="live-dot"></span>
      <span>실시간 가격</span>
    </div>
  </div>
</div>

<div class="summary">
  <div class="s-card blue">
    <div class="s-label">총 평가금액</div>
    <div class="s-value" id="total-val">₩0</div>
  </div>
  <div class="s-card" id="ret-card">
    <div class="s-label">총 수익률</div>
    <div class="s-value" id="total-ret">0.00%</div>
  </div>
</div>

<div class="tabs-wrap">
  <button class="tab active" onclick="filterTab('all', this)">전체</button>
  <button class="tab" onclick="filterTab('KRX', this)">🇰🇷 한국</button>
  <button class="tab" onclick="filterTab('US', this)">🇺🇸 미국</button>
  <button class="tab" onclick="filterTab('ETF', this)">ETF</button>
</div>

<div class="section" id="accounts-container"></div>

<button class="fab" onclick="openAddModal()">＋</button>

<div class="sheet-bg" id="add-modal" onclick="if(event.target===this)closeModal('add-modal')">
  <div class="sheet">
    <div class="sheet-title">종목 추가</div>
    <div class="form-row">
      <div class="form-label">계좌명</div>
      <input type="text" id="f-acct" placeholder="예: 키움증권 ISA">
    </div>
    <div class="form-row">
      <div class="form-label">티커 (예: AAPL, 005930.KS)</div>
      <input type="text" id="f-ticker" placeholder="TICKER">
    </div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
      <div class="form-row">
        <div class="form-label">수량</div>
        <input type="number" id="f-qty" placeholder="0">
      </div>
      <div class="form-row">
        <div class="form-label">평단가</div>
        <input type="number" id="f-avg" placeholder="0">
      </div>
    </div>
    <div class="form-row">
      <div class="form-label">시장</div>
      <select id="f-market">
        <option value="KRX">한국 (KRX)</option>
        <option value="US">미국 (US)</option>
        <option value="ETF">ETF</option>
      </select>
    </div>
    <div class="btn-group">
      <button class="btn btn-cancel" onclick="closeModal('add-modal')">취소</button>
      <button class="btn btn-save" onclick="saveStock()">저장하기</button>
    </div>
  </div>
</div>

<div class="sheet-bg" id="del-modal" onclick="if(event.target===this)closeModal('del-modal')">
  <div class="sheet">
    <div class="sheet-title" id="del-title">종목 삭제</div>
    <p style="font-size: 14px; color: var(--text2); margin-bottom: 20px;">정말로 이 종목을 삭제하시겠습니까? 삭제 후에는 복구할 수 없습니다.</p>
    <button class="btn btn-delete" onclick="confirmDelete()">삭제 확정</button>
    <button class="btn btn-cancel" style="width:100%; margin-top:8px;" onclick="closeModal('del-modal')">닫기</button>
  </div>
</div>

<script>
// --- 데이터 엔진 ---
let portfolio = JSON.parse(localStorage.getItem('pf_data')) || { accounts: {} };
let currentFilter = 'all';
let deleteTarget = null; // { acctName, stockIdx }
const USD_KRW = 1380; // 고정 환율 예시

function saveData() {
  localStorage.setItem('pf_data', JSON.stringify(portfolio));
}

// --- 렌더링 ---
function renderAll() {
  const container = document.getElementById('accounts-container');
  container.innerHTML = '';
  let totalVal = 0, totalCost = 0;
  let hasData = false;

  for (const [acctName, data] of Object.entries(portfolio.accounts)) {
    const filteredStocks = data.stocks.filter(s => currentFilter === 'all' || s.market === currentFilter);
    if (filteredStocks.length === 0) continue;
    hasData = true;

    let acctVal = 0;
    const acctDiv = document.createElement('div');
    acctDiv.className = 'acct-card';
    
    let stocksHtml = filteredStocks.map((s) => {
      const idx = data.stocks.indexOf(s);
      const isUS = s.market === 'US';
      const curPrice = s.price || s.avg;
      const val = curPrice * s.qty * (isUS ? USD_KRW : 1);
      const cost = s.avg * s.qty * (isUS ? USD_KRW : 1);
      
      totalVal += val;
      totalCost += cost;
      acctVal += val;

      const pnlPct = ((curPrice - s.avg) / s.avg * 100).toFixed(2);

      return `
        <div class="stock-row" onclick="openDelModal('${acctName}', ${idx})">
          <div>
            <div><span class="ticker">${s.ticker}</span><span class="mkt-badge">${s.market}</span></div>
            <div class="stock-info">${s.qty}주 · 평단 ${s.avg.toLocaleString()}</div>
          </div>
          <div class="stock-right">
            <div class="ticker">${(curPrice * s.qty).toLocaleString()}</div>
            <div class="stock-info ${pnlPct >= 0 ? 'pos' : 'neg'}">${pnlPct >= 0 ? '+' : ''}${pnlPct}%</div>
          </div>
        </div>
      `;
    }).join('');

    acctDiv.innerHTML = `
      <div class="acct-header">
        <span class="acct-name">🏦 ${acctName}</span>
        <span class="ticker">₩${acctVal.toLocaleString()}</span>
      </div>
      ${stocksHtml}
    `;
    container.appendChild(acctDiv);
  }

  // 요약 업데이트
  document.getElementById('total-val').textContent = `₩${totalVal.toLocaleString()}`;
  const totalRet = totalCost > 0 ? ((totalVal - totalCost) / totalCost * 100).toFixed(2) : "0.00";
  const retEl = document.getElementById('total-ret');
  retEl.textContent = `${totalRet >= 0 ? '+' : ''}${totalRet}%`;
  retEl.className = `s-value ${totalRet >= 0 ? 'pos' : 'neg'}`;
  document.getElementById('ret-card').className = `s-card ${totalRet >= 0 ? 'green' : 'red'}`;

  if (!hasData) {
    container.innerHTML = '<div class="empty-state">데이터가 없습니다. 종목을 추가해주세요.</div>';
  }
}

// --- 액션 ---
function filterTab(f, el) {
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderAll();
}

function openAddModal() {
  document.getElementById('add-modal').classList.add('open');
}

function openDelModal(acctName, idx) {
  deleteTarget = { acctName, stockIdx: idx };
  const stock = portfolio.accounts[acctName].stocks[idx];
  document.getElementById('del-title').textContent = `${stock.ticker} 삭제`;
  document.getElementById('del-modal').classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function saveStock() {
  const acct = document.getElementById('f-acct').value.trim();
  const ticker = document.getElementById('f-ticker').value.trim().toUpperCase();
  const qty = parseFloat(document.getElementById('f-qty').value);
  const avg = parseFloat(document.getElementById('f-avg').value);
  const market = document.getElementById('f-market').value;

  if (!acct || !ticker || !qty || !avg) return alert("모든 정보를 입력하세요.");

  if (!portfolio.accounts[acct]) portfolio.accounts[acct] = { stocks: [] };
  portfolio.accounts[acct].stocks.push({ ticker, qty, avg, market, price: null });

  saveData();
  renderAll();
  closeModal('add-modal');
  // 입력창 초기화
  ['f-acct', 'f-ticker', 'f-qty', 'f-avg'].forEach(id => document.getElementById(id).value = '');
}

function confirmDelete() {
  if (!deleteTarget) return;
  const { acctName, stockIdx } = deleteTarget;

  // 삭제 실행
  portfolio.accounts[acctName].stocks.splice(stockIdx, 1);

  // 계좌가 비었으면 계좌 삭제
  if (portfolio.accounts[acctName].stocks.length === 0) {
    delete portfolio.accounts[acctName];
  }

  saveData();
  renderAll();
  closeModal('del-modal');
  deleteTarget = null;
}

// 초기 실행
renderAll();
</script>
</body>
</html>
