<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>내 포트폴리오</title>
<style>
  /* [기존 스타일 유지] */
  :root {
    --bg: #0f172a; --bg2: #1e293b; --bg3: #334155;
    --surface: #1e293b; --text: #f1f5f9; --text2: #94a3b8;
    --blue: #3b82f6; --green: #22c55e; --red: #ef4444;
    --border: rgba(148,163,184,0.12); --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 80px; }
  .header { position: sticky; top: 0; z-index: 100; background: rgba(15,23,42,0.85); backdrop-filter: blur(10px); padding: 16px; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .summary { padding: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .s-card { background: var(--surface); padding: 16px; border-radius: var(--radius); border-top: 3px solid var(--blue); }
  .s-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .s-value { font-size: 18px; font-weight: 700; }
  .acct-card { background: var(--surface); margin: 0 16px 12px; border-radius: var(--radius); overflow: hidden; }
  .acct-header { padding: 12px 16px; background: rgba(255,255,255,0.03); font-size: 14px; font-weight: 600; display: flex; justify-content: space-between; }
  .stock-row { display: flex; justify-content: space-between; padding: 14px 16px; border-top: 0.5px solid var(--border); }
  .pos { color: var(--green); } .neg { color: var(--red); }
  .stock-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .stock-info { font-size: 11px; color: var(--text2); }
  .fab { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; border-radius: 28px; background: var(--blue); color: #fff; font-size: 30px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
</style>
</head>
<body>

<div class="header">
  <span style="font-weight:700">보유 종목</span>
  <div id="status" style="font-size:12px; color:var(--green)">연결됨</div>
</div>

<div class="summary">
  <div class="s-card">
    <div class="s-label">총 평가자산</div>
    <div class="s-value" id="total-val">₩0</div>
  </div>
  <div class="s-card">
    <div class="s-label">총 수익률</div>
    <div class="s-value" id="total-ret">0.00%</div>
  </div>
</div>

<div id="container"></div>

<script>
// 데이터 구조 (이미지 기반으로 초기값 설정)
let portfolio = JSON.parse(localStorage.getItem('pf_v2')) || {
  accounts: {
    "기본계좌": {
      stocks: [
        {ticker: "000660", market: "KRX", qty: 9, avg: 1050222}
      ]
    }
  }
};

// ── 핵심: 실시간 가격 및 종목명 조회 (CORS 우회) ──
async function fetchStockData(ticker, market) {
  try {
    // 한국 주식 티커 보정 (숫자 6자리인 경우)
    let symbol = ticker;
    if (market === 'KRX' && !ticker.includes('.')) {
      symbol = ticker + ".KS"; 
    }

    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?range=1d&interval=1d`;
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    
    const res = await fetch(proxyUrl);
    const data = await res.json();
    const contents = JSON.parse(data.contents);
    
    const meta = contents.chart.result[0].meta;
    return {
      price: meta.regularMarketPrice,
      name: meta.shortName || ticker // API에서 제공하는 종목명 사용
    };
  } catch (e) {
    console.error(ticker, "조회 실패");
    return null;
  }
}

async function refreshAll() {
  document.getElementById('status').textContent = "조회 중...";
  
  for (const acct in portfolio.accounts) {
    for (const s of portfolio.accounts[acct].stocks) {
      const live = await fetchStockData(s.ticker, s.market);
      if (live) {
        s.curPrice = live.price;
        s.name = live.name;
      }
    }
  }
  
  document.getElementById('status').textContent = "실시간 완료";
  render();
}

function render() {
  const container = document.getElementById('container');
  container.innerHTML = '';
  let tVal = 0, tCost = 0;

  for (const acct in portfolio.accounts) {
    let acctSum = 0;
    const card = document.createElement('div');
    card.className = 'acct-card';
    
    const rows = portfolio.accounts[acct].stocks.map(s => {
      const cur = s.curPrice || s.avg; // 가격 못 가져오면 평단가로 표시
      const val = cur * s.qty;
      const cost = s.avg * s.qty;
      tVal += val; tCost += cost; acctSum += val;
      const pnl = ((cur - s.avg) / s.avg * 100).toFixed(2);
      const isPriceLoaded = !!s.curPrice;

      return `
        <div class="stock-row">
          <div>
            <div class="stock-name">${s.name || s.ticker}</div>
            <div class="stock-info">${s.ticker} · ${s.qty}주 · ₩${s.avg.toLocaleString()}</div>
          </div>
          <div style="text-align:right">
            <div style="font-weight:600" class="${!isPriceLoaded ? 'neu' : ''}">
              ₩${Math.round(val).toLocaleString()}
            </div>
            <div class="stock-info ${pnl >= 0 ? 'pos' : 'neg'}">
              ${isPriceLoaded ? (pnl >= 0 ? '+' : '') + pnl + '%' : '조회 대기'}
            </div>
          </div>
        </div>
      `;
    }).join('');

    card.innerHTML = `<div class="acct-header"><span>🏦 ${acct}</span><span>₩${Math.round(acctSum).toLocaleString()}</span></div>${rows}`;
    container.appendChild(card);
  }

  document.getElementById('total-val').textContent = '₩' + Math.round(tVal).toLocaleString();
  const totalRet = tCost > 0 ? ((tVal - tCost) / tCost * 100).toFixed(2) : 0;
  const retEl = document.getElementById('total-ret');
  retEl.textContent = (totalRet >= 0 ? '+' : '') + totalRet + '%';
  retEl.className = 's-value ' + (totalRet >= 0 ? 'pos' : 'neg');
  
  localStorage.setItem('pf_v2', JSON.stringify(portfolio));
}

// 실행
render();
refreshAll();
</script>
</body>
</html>
